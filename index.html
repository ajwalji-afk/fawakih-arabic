<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fawakih Master App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: Georgia; background:#f7f3ec; padding:20px;}
button { margin:5px; padding:10px;}
</style>
</head>
<body>

<div id="login">
<h2>Fawakih Arabic</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="signup()">Create account</button>
<p id="status"></p>
</div>

<div id="app" style="display:none">
<h2>Select Lesson</h2>
<div id="lessons"></div>
<div id="content"></div>
</div>

<script>
const supabase = window.supabase.createClient(
"https://ighwjwnkwfbhsgtqdkui.supabase.co",
"sb_publishable_slSC2iUullagRc3h_FKKbQ_7OisDAVg"
);

function setStatus(m){document.getElementById("status").innerText=m;}

async function login(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
const {error}=await supabase.auth.signInWithPassword({email,password});
if(error){setStatus(error.message);return;}
showApp();
}

async function signup(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
const {error}=await supabase.auth.signUp({email,password});
if(error){setStatus(error.message);return;}
setStatus("Account created. Now login.");
}

function showApp(){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
loadLessonButtons();
}

function loadLessonButtons(){
let html="";
for(let i=1;i<=12;i++){
html+=`<button onclick="loadLesson(${i})">Lesson ${i}</button>`;
}
document.getElementById("lessons").innerHTML=html;
}

function loadLesson(num){
document.getElementById("content").innerHTML=
"<h3>Lesson "+num+"</h3><p>Full lesson integration coming next step.</p>";
}
</script>

</body>
</html>
