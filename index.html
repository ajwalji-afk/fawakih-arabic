// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────
function shuffle(a) {
  for (let i = a.length - 1; i &gt; 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function norm(s) {
  return s.trim().toLowerCase().replace(/[()[\]،,./\\]/g,&#x27;&#x27;).replace(/\s+/g,&#x27; &#x27;);
}
function checkMatch(user, correct) {
  const u = norm(user);
  const alts = correct.split(&#x27;/&#x27;).map(a =&gt; norm(a.trim()));
  return alts.some(a =&gt; u === a);
}

function switchTab(name) {
  document.querySelectorAll(&#x27;.tab-btn&#x27;).forEach((b,i) =&gt; {
    b.classList.toggle(&#x27;active&#x27;, [&#x27;vocab&#x27;,&#x27;classify&#x27;,&#x27;pronouns&#x27;,&#x27;grammar&#x27;][i] === name);
  });
  document.querySelectorAll(&#x27;.tab-content&#x27;).forEach(c =&gt; c.classList.remove(&#x27;active&#x27;));
  document.getElementById(&#x27;tab-&#x27; + name).classList.add(&#x27;active&#x27;);
}

    btn.textContent = opt;
    btn.onclick = () =&gt; onAnswer(i, correctIdx);
    container.appendChild(btn);
  });
}
function lockMCOptions(containerId, chosenIdx, correctIdx) {
  document.querySelectorAll(`#${containerId} .mc-option`).forEach((btn, i) =&gt; {
    btn.classList.add(&#x27;disabled&#x27;);
    if (i === correctIdx) btn.classList.add(&#x27;correct&#x27;);
    else if (i === chosenIdx) btn.classList.add(&#x27;wrong&#x27;);
  });
}

    explain: &quot;مَرْفُوع (nominative) is the case used for the subject of a sentence, among other functions.&quot;
  },
  {
    q: &quot;The accusative case (نَصْب) is used for which grammatical role?&quot;,
    options: [&quot;Subject of the sentence&quot;, &quot;Word after a preposition&quot;, &quot;Direct object of the sentence&quot;, &quot;The verb&quot;],
    answer: 2,
    explain: &quot;نَصْب (accusative / مَنْصُوب) is used for the direct object of a sentence, among other functions.&quot;
  },

  // ── DETACHED PRONOUNS ──
  {
    q: &quot;Detached pronouns are always considered:&quot;,
    options: [&quot;Indefinite&quot;, &quot;Definite&quot;, &quot;Neither — it depends on context&quot;, &quot;Only definite in the first person&quot;],
    answer: 1,
    explain: &quot;All detached pronouns (هُوَ, أَنَا, نَحْنُ etc.) are definite — they always refer to a specific person.&quot;
  },
  {
    q: &quot;Detached pronouns are generally used as what part of a sentence?&quot;,
    options: [&quot;The direct object&quot;, &quot;The verb&quot;, &quot;The subject pronoun&quot;, &quot;A preposition&quot;],
    answer: 2,
    explain: &quot;Detached pronouns function as subject pronouns — e.g. هُوَ كَتَبَ (He wrote).&quot;
  },
  {
    q: &quot;If you want to add EMPHASIS to the subject &#x27;he&#x27; in a sentence, you would:&quot;,
    options: [
      &quot;Use a longer vowel&quot;,
      &quot;Add هُوَ explicitly before the verb&quot;,
      &quot;Add tanwīn to the verb&quot;,
      &quot;Use the plural form&quot;
    ],
    answer: 1,
    explain: &quot;Verbs already contain the subject. Adding هُوَ explicitly emphasises &#x27;HE specifically did it.&#x27;&quot;
  },
  {
    q: &quot;Throughout the Qur&#x27;ān, Allah sometimes uses نَحْنُ (We). This is known as:&quot;,
    options: [
      &quot;A grammatical error corrected later&quot;,
      &quot;The majestic plural — referring to a single entity of high rank&quot;,
      &quot;Proof of multiple divine beings&quot;,
      &quot;The plural of respect for angels&quot;
    ],
    answer: 1,
    explain: &quot;The majestic or royal &#x27;we&#x27; is a classical linguistic device indicating greatness, not plurality.&quot;
  },
  {
    q: &quot;How many total detached pronouns are there in Arabic (as introduced in Lesson 1)?&quot;,
    options: [&quot;8&quot;, &quot;10&quot;, &quot;12&quot;, &quot;14&quot;],
    answer: 3,
    explain: &quot;There are 14 detached pronouns: covering 3rd person (m/f, singular/dual/plural), 2nd person (m/f, singular/dual/plural), and 1st person (singular/plural).&quot;
  },

  // ── AL-FĀTIḤA TEXT ANALYSIS ──
  {
    q: &quot;In the word نَسْتَعِينُ from al-Fātiḥa, how many English words are needed to translate it?&quot;,
    options: [&quot;1&quot;, &quot;2&quot;, &quot;3&quot;, &quot;4&quot;],
    answer: 2,
    explain: &quot;نَسْتَعِينُ breaks into نـ (we) + سْتـ (seek) + عِين (help) — three English words packed into one Arabic word.&quot;
  },
  {
    q: &quot;اِهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ — with إِلَى absent, &#x27;guide us&#x27; means:&quot;,
    options: [
      &quot;Guide us TO the straight path (implying we are not on it)&quot;,
      &quot;Guide us ON the straight path (implying we are already on it)&quot;,
      &quot;Show us where the path is&quot;,
      &quot;No difference — إِلَى is always implied&quot;
    ],
    answer: 1,
    explain: &quot;Without إِلَى, اِهْدِ + direct object means &#x27;guide us on/along&#x27;. With إِلَى, it means &#x27;guide us TO (implying not yet on it)&#x27;.&quot;
  },
  {
    q: &quot;The first half of Sūrat al-Fātiḥa (verses 1–4) contains only which word type?&quot;,
    options: [&quot;Only verbs (fi&#x27;l)&quot;, &quot;Only particles (harf)&quot;, &quot;Only nouns (ism)&quot;, &quot;A mix of all three&quot;],
    answer: 2,
    explain: &quot;Verses 1–4 of al-Fātiḥa consist entirely of isms. This conveys timeless, eternal attributes — not actions tied to a moment.&quot;
  },
  {
    q: &quot;Who is credited as the first person to put Arabic grammar into writing?&quot;,
    options: [&quot;Imām al-Shāfi&#x27;ī&quot;, &quot;Sībawayh&quot;, &quot;Caliph ʿAlī ibn Abī Ṭālib&quot;, &quot;Ibn Mālik&quot;],
    answer: 2,
    explain: &quot;Caliph ʿAlī ibn Abī Ṭālib, motivated by the spread of ungrammatical speech, was the first to codify Arabic grammar — starting with the three categories of words.&quot;
  },
  {
    q: &quot;Grammar and morphology are related but different. Which is the correct distinction?&quot;,
    options: [
      &quot;Grammar studies individual word formation; morphology studies sentence function&quot;,
      &quot;Grammar studies sentence function; morphology studies individual word formation&quot;,
      &quot;They are the same thing with different names&quot;,
      &quot;Grammar is only for verbs; morphology is only for nouns&quot;
    ],
    answer: 1,
    explain: &quot;Grammar (نَحْو) studies how words function in sentences. Morphology (صَرْف) studies how individual words are internally formed.&quot;
  },
  {
    q: &quot;Which verse of al-Fātiḥa contains both a fi&#x27;l AND a pronoun acting as subject?&quot;,
    options: [
      &quot;الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ (verse 2)&quot;,
      &quot;إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ (verse 5)&quot;,
      &quot;مَالِكِ يَوْمِ الدِّينِ (verse 4)&quot;,
      &quot;بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ (verse 1)&quot;
    ],
    answer: 1,
    explain: &quot;Verse 5 contains نَعْبُدُ (we worship) and نَسْتَعِينُ (we seek help) — both fi&#x27;ls with the pronoun &#x27;we&#x27; embedded, marking the shift from description to direct address.&quot;
  },
];

let gQueue, gIdx, gScore, gTotal;
function gInit() {
  gQueue = shuffle(grammarData.map((q,i) =&gt; ({...q, origIdx: i})));
  gIdx = 0; gScore = 0; gTotal = 0;
  gShow();
}
function gShow() {
  if (gIdx &gt;= gQueue.length) {
    document.getElementById(&#x27;g-card&#x27;).innerHTML = `&lt;div class=&quot;done-screen&quot;&gt;
      &lt;div class=&quot;big-check&quot;&gt;✓&lt;/div&gt;
      &lt;p&gt;Final score: ${gScore} / ${gTotal}&lt;/p&gt;
      &lt;small&gt;${Math.round(gScore/gTotal*100)}% correct&lt;/small&gt;&lt;br&gt;
      &lt;button class=&quot;restart-btn&quot; onclick=&quot;gInit()&quot;&gt;Try again ↺&lt;/button&gt;
    &lt;/div&gt;`;
    document.getElementById(&#x27;g-prog&#x27;).style.width = &#x27;100%&#x27;;
    document.getElementById(&#x27;g-counter&#x27;).textContent = &#x27;Done!&#x27;;
    return;
  }
  const q = gQueue[gIdx];
  document.getElementById(&#x27;g-prompt&#x27;).textContent = q.q;
  document.getElementById(&#x27;g-feedback&#x27;).innerHTML = &#x27;&#x27;;
  document.getElementById(&#x27;g-next-row&#x27;).style.display = &#x27;none&#x27;;

  // Shuffle options while tracking correct answer
  const indices = [0,1,2,3];
  shuffle(indices);
  const newCorrect = indices.indexOf(q.answer);
  const opts = document.getElementById(&#x27;g-options&#x27;);
  opts.innerHTML = &#x27;&#x27;;
  indices.forEach((origIdx, newIdx) =&gt; {
    const btn = document.createElement(&#x27;button&#x27;);
    btn.className = &#x27;mc-option&#x27;;
    btn.textContent = q.options[origIdx];
    btn.onclick = () =&gt; gAnswer(newIdx, newCorrect, q.explain, q.options[q.answer]);
    opts.appendChild(btn);
  });

  gMeta();
}
function gMeta() {
  document.getElementById(&#x27;g-score&#x27;).textContent = `Score: ${gScore} / ${gTotal}`;
  document.getElementById(&#x27;g-counter&#x27;).textContent = `Q ${Math.min(gIdx+1, gQueue.length)} of ${gQueue.length}`;
  document.getElementById(&#x27;g-prog&#x27;).style.width = (gIdx/gQueue.length*100).toFixed(0)+&#x27;%&#x27;;
}
function gAnswer(chosen, correct, explain, correctText) {
  const ok = chosen === correct;
  gTotal++; if (ok) gScore++;
  gMeta();
  document.querySelectorAll(&#x27;.mc-option&#x27;).forEach((btn, i) =&gt; {
    btn.classList.add(&#x27;disabled&#x27;);
    if (i === correct) btn.classList.add(&#x27;correct&#x27;);
    else if (i === chosen &amp;&amp; !ok) btn.classList.add(&#x27;wrong&#x27;);
  });
  document.getElementById(&#x27;g-feedback&#x27;).innerHTML = ok
    ? `&lt;div class=&quot;feedback-box feedback-correct&quot;&gt;Correct! ${explain}&lt;/div&gt;`
    : `&lt;div class=&quot;feedback-box feedback-wrong&quot;&gt;The answer is &lt;strong&gt;${correctText}&lt;/strong&gt;. ${explain}&lt;/div&gt;`;
  document.getElementById(&#x27;g-next-row&#x27;).style.display = &#x27;flex&#x27;;
  gIdx++;
}
function gNext() { gShow(); }

// ─────────────────────────────────────────────
// INIT ALL
// ─────────────────────────────────────────────
vInit(); cInit(); pInit(); gInit();
&lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;
`;

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function showApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadLessonButtons();
}

function showLogin() {
  document.getElementById("login").style.display = "block";
  document.getElementById("app").style.display = "none";
}

async function testConnection() {
  setStatus("Testing Supabase connection...");
  try {
    const { error } = await client.auth.getSession();
    if (error) {
      setStatus("Connection error: " + error.message);
      return;
    }
    setStatus("Connection OK. Now try Create account or Login.");
  } catch (err) {
    setStatus("JavaScript/network error: " + err.message);
  }
}

async function signup() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    setStatus("Enter email and password first.");
    return;
  }

  setStatus("Creating account...");

  try {
    const { error } = await client.auth.signUp({ email, password });
    if (error) {
      setStatus("Sign-up error: " + error.message);
      return;
    }
    setStatus("Account created. Now click Login. If it says email not confirmed, turn off email confirmation in Supabase for testing.");
  } catch (err) {
    setStatus("JavaScript/network error: " + err.message);
  }
}

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    setStatus("Enter email and password first.");
    return;
  }

  setStatus("Logging in...");

  try {
    const { error } = await client.auth.signInWithPassword({ email, password });
    if (error) {
      setStatus("Login error: " + error.message);
      return;
    }
    setStatus("");
    showApp();
  } catch (err) {
    setStatus("JavaScript/network error: " + err.message);
  }
}

async function logout() {
  await client.auth.signOut();
  showLogin();
}

async function checkSession() {
  try {
    const { data } = await client.auth.getSession();
    if (data && data.session) {
      showApp();
    }
  } catch (err) {
    setStatus("Session check error: " + err.message);
  }
}

function loadLessonButtons() {
  let html = "";
  for (let i = 1; i <= 12; i++) {
    html += `<button class="lesson-btn" onclick="loadLesson(${i})">Lesson ${i}</button>`;
  }
  document.getElementById("lessons").innerHTML = html;
}

function showMenu() {
  document.getElementById("lesson-frame").style.display = "none";
  document.getElementById("menu").style.display = "block";
  document.getElementById("active-label").textContent = "";
}

function loadLesson(num) {
  if (num === 1) {
    document.getElementById("menu").style.display = "none";
    const frame = document.getElementById("lesson-frame");
    frame.style.display = "block";
    frame.srcdoc = LESSON_1_HTML;
    document.getElementById("active-label").textContent = "Lesson 1";
  } else {
    document.getElementById("lesson-frame").style.display = "none";
    document.getElementById("menu").style.display = "block";
    document.getElementById("active-label").textContent = "";
    alert("Lesson " + num + " is not integrated yet. We’ll add it next.");
  }
}

checkSession();
</script>
